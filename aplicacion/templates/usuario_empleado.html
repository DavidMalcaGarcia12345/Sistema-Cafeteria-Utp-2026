<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cafeteria Express</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-lg">
                    <div class="card-header bg-success text-white text-center">
                        <h4>INGRESAR AL SISTEMA</h4>
                    </div>
                    <div class="card-body">
                        
                        <!-- Mostramos el mensaje de error si existe -->
                        {% if error %}
                            <div class="alert alert-danger" role="alert">
                                {{ error }}
                            </div>
                        {% endif %}

                        <form method="POST">
                            {% csrf_token %}
                            
                            <div class="mb-3">
                                <label for="usuario" class="form-label">USUARIO</label>
                                <!-- Se agrega name="usuario" -->
                                <input type="text" name="usuario" class="form-control" id="usuario" placeholder="Ingrese su usuario" required>
                            </div>
                            <div class="mb-3">
                                <label for="contrasenia" class="form-label">CONTRASEÑA</label>
                                <!-- Se agrega name="contrasenia" -->
                                <input type="password" name="contrasenia" class="form-control" id="contrasenia" placeholder="Ingrese su contraseña" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">INGRESAR</button>
                        </form>

                    </div>
                    <div class="card-footer text-center text-muted">
                        <small>© 2026 Sistema de Cafeteria</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
